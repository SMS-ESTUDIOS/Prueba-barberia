<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbería Rod'S | Oficial</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --gold: #d4af37; --dark-bg: #0a0a0a; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--dark-bg); color: #fff; }
        
        .navbar { background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--gold); }
        
        /* Efecto de iluminación para los links */
        .nav-link-custom {
            color: #fff !important;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
            padding-bottom: 3px;
        }
        .nav-link-custom:hover {
            color: var(--gold) !important;
            border-color: var(--gold);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        /* Animación Pulso para Reservar */
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        .btn-reservar-anim {
            background-color: #ffc107;
            color: #000 !important;
            font-weight: 800;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            padding: 8px 25px;
            transition: 0.3s;
            animation: pulse-gold 2s infinite;
        }
        .btn-reservar-anim:hover {
            background-color: #fff;
            animation: none;
            transform: scale(1.05);
        }

        /* Forzar menú horizontal sin hamburguesa en móvil */
        .nav-custom-flow {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 15px;
        }

        @media (max-width: 576px) {
            .navbar-brand { font-size: 1.2rem !important; }
            .nav-link-custom { font-size: 0.75rem; }
            .btn-reservar-anim { padding: 6px 15px; font-size: 0.75rem; }
            .nav-custom-flow { gap: 10px; }
        }

        .hero-section { 
            height: 90vh; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1585747860715-2ba37e788b70?q=80&w=2074');
            background-size: cover; background-position: center; 
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        
        .main-logo-hero { 
            max-width: 420px; width: 85%; 
            filter: drop-shadow(0px 10px 20px rgba(212, 175, 55, 0.4));
            display: block; margin: 0 auto 30px; 
        }

        .btn-outline-gold { 
            border: 2px solid var(--gold); color: #fff; font-family: 'Bebas Neue'; 
            font-size: 1.5rem; letter-spacing: 2px; padding: 10px 40px;
            transition: 0.3s; text-decoration: none; display: inline-block;
        }
        .btn-outline-gold:hover { background: var(--gold); color: #000; }
        
        .info-card { background: #111; border-left: 4px solid var(--gold); padding: 25px; border-radius: 10px; }
        .social-link { color: #fff; font-size: 2.2rem; transition: 0.3s; margin-right: 20px; text-decoration: none; }
        .social-link:hover { color: var(--gold); transform: translateY(-3px); }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fs-2" href="index.html" style="font-family: 'Bebas Neue';">ROD'S <span style="color: var(--gold);">BARBERIA</span></a>
            
            <div class="nav-custom-flow">
                <a class="nav-link-custom fw-bold" href="servicios.html">SERVICIOS</a>
                <a class="nav-link-custom fw-bold" href="productos.html">PRODUCTOS</a>
                <a class="btn-reservar-anim fw-bold" href="https://wa.me/527712381936">RESERVAR</a>
            </div>
        </div>
    </nav>

    <header class="hero-section">
        <div class="container animate__animated animate__fadeIn">
            <img src="logo_rods.png" alt="Logo Rod's" class="main-logo-hero">
            <a href="servicios.html" class="btn-outline-gold">VER MENÚ DE SERVICIOS</a>
        </div>
    </header>

    <section class="py-5">
        <div class="container">
            <div class="row g-4">
                <div class="col-md-5">
                    <div class="info-card">
                        <h3 class="mb-4" style="font-family: 'Bebas Neue'; color: var(--gold);">HORARIOS</h3>
                        <ul class="list-unstyled small mb-4">
                            <li>Lunes - Miércoles: 10:00 a.m. – 8:00 p.m.</li>
                            <li>Jueves - Viernes: 10:00 a.m. – 8:00 p.m.</li>
                            <li>Sábado: 10:00 a.m. – 6:00 p.m.</li>
                            <li>Domingo: 12:00 p.m. – 5:00 p.m.</li>
                        </ul>
                        <h6 class="mb-3">SÍGUENOS:</h6>
                        <a href="https://www.instagram.com/_barberiarods?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" class="social-link"><i class="fab fa-instagram"></i></a>
                        <a href="https://wa.me/527712381936" target="_blank" class="social-link"><i class="fab fa-whatsapp"></i></a>
                    </div>
                </div>
                <div class="col-md-7">
                    <div style="padding: 8px; background: linear-gradient(135deg, var(--gold), #554411); border-radius: 20px;">
                        <div style="border-radius: 15px; overflow: hidden; height: 350px;">
                            <iframe 
                                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3747.3484273574163!2d-98.7753856!3d20.0776739!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x85d1a1b02b7e15e7%3A0xc49b78e388185834!2sBarber%C3%ADa%20Rod's!5e0!3m2!1ses-419!2smx!4v1712615432123!5m2!1ses-419!2smx" 
                                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                            </iframe>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
